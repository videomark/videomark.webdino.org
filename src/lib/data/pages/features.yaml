ja:
  meta:
    pageTitle: 機能と使い方
    pageDescription: Web VideoMark の主な機能と使い方について説明します。
  intro:
    heading: 機能と使い方
    body: Web VideoMark は、動画配信サービスで動画を視聴する際の再生品質を計測・確認できるブラウザー拡張機能です。このページでは Web VideoMark の主な機能と使い方について説明します。
  install:
    heading: インストール
    body: パソコンで動画再生時の品質を計測・確認するには Chrome、Edge、Firefox またはその互換ブラウザーに拡張機能をインストールしてください。 Android スマートフォン・タブレットでは Firefox 用拡張機能をご利用いただけます。 プライバシーポリシーと利用規約の確認画面が表示され、それに確認・同意いただけると計測可能になります。
  player_details:
    heading: 動画視聴中に詳細を確認
    body: |-
      動画視聴中にオーバーレイをクリックすると、表示領域が拡大し、計測中のデータの数値と推移が表示されます。

      計測サイトや動画によって異なりますが、再生中の動画のフレームレート、再生中の動画のフレームドロップ率 (コマ落ちしたフレーム数 / 再生した総フレーム数) などを確認できます。
    image:
      src: https://res.cloudinary.com/videomark/c_crop,g_north_west,h_500,w_900,x_5,y_80/w_800/pc/youtube-05.jpg
      alt: YouTube 計測画面 (詳細)
  result_list:
    heading: 計測結果を一覧で確認
    body: |-
      ブラウザーのツールバーに Web VideoMark ボタンを追加し、これをクリックすると、最近再生した動画を簡単に確認できます。ポップアップの左下にある「すべて見る」をクリックすると、視聴履歴画面が新しいタブで開きます。

      このページでは、すべての対応サービスで再生した動画の計測結果を一覧でき、キーワードでの検索、日時や動画配信サービスごとの絞り込みなどが可能です。また、各動画の詳細な計測結果を見ることもできます。
    image:
      src: https://res.cloudinary.com/videomark/c_scale,w_800/pc/logview-03.jpg
      alt: 計測結果の一覧表示
  result_details:
    heading: 計測結果の詳細
    body: |-
      計測結果一覧画面に表示されている計測結果のいずれかをクリックすると、拡大表示してその計測結果の追加情報が表示されます。動画のメタデータや視聴全体のフレームドロップ率などを確認できます。

      計測結果のより詳細を確認したり比較したりしやすいよう改善していく予定です。今後のバージョンアップにご期待下さい。

      その計測結果を一覧から削除したい場合には「この計測結果を削除する」をクリックしてください。次回のページ読み込み時にブラウザーとサーバーの双方からデータが削除されます。
    image:
      src: https://res.cloudinary.com/videomark/c_crop,g_center,h_700,w_600,y_40/pc/logview-modal-04.jpg
      alt: 計測結果の詳細表示
