    heading: 統計情報
    body: ここでは Web VideoMark プロジェクトの計測によって得られる、動画再生時の再生品質データの平均などの統計情報を公開しています。サイドバーの項目を選択して、動画視聴数や応答時間・通信速度などの統計情報を確認できます。統計の元となる計測結果ログは [オープンデータ](/ja/opendata) として公開しています。詳細の確認や独自の分析などにご利用ください。
