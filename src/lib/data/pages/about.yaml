ja:
  meta:
    pageTitle: プロジェクトについて
    pageDescription: Web VideoMark プロジェクトは、動画再生時の再生品質データを分析し、ネットワーク資源の有効活用と品質向上に役立てる調査研究プロジェクトです。
  intro:
    heading: プロジェクトについて
    body: |-
      Web VideoMark プロジェクトは、[世界のインターネット通信の 6 割を占める](https://www.sandvine.com/phenomena) 動画配信サービスを実際に利用して視聴した際の品質データを分析・公開し、ネットワーク資源の有効活用と品質向上に役立てる調査研究プロジェクトです。
  background:
    heading: 背景・目的
    body: |-
      従来、利用者自身がキャリアやプロバイダーなどのネットワーク品質を確認するには、スピードテストのような単純な計測ツールが利用されてきました。しかし、実際のインターネットは通信内容に応じた最適化が広く実施されており、実際のサービス利用時の品質を評価することは難しい状況でした。Web VideoMark ではインターネットで最も帯域を使う実際の動画配信サービス利用時の品質を計測することで、実態に即したネットワーク評価が可能になります。

      本プロジェクトでは、動画配信サービス利用時の再生品質を客観的に推定し、共有・比較できるツールとして、ブラウザーに組み込む [Chrome/Edge 用拡張機能](/chromeextension) (パソコン向け) と [Firefox 用拡張機能](/firefoxextension) (パソコン、Android 向け) を提供しています。これらのツールをインストールしたら AMEBA、Netflix、TVer、YouTube などの [対応サービス](/ja/spec) でいつも通り動画をお楽しみください。動画再生時のビットレート・解像度・フレームレートなどの再生品質パラメーターを記録し、数値として表示します。

      利用者が Web VideoMark のツールを使って再生品質を計測することによって集められる、再生品質パラメーターやネットワーク情報などの視聴情報は、キャリアやプロバイダーなどの通信事業者や動画配信サービス事業者のサービス品質改善に役立てられます。また、学術研究用のデータとしても活用・公開されます。
    image:
      src: https://res.cloudinary.com/videomark/h_300/dino/stand.png
      alt: Dino の挿絵
  architecture:
    heading: 仕組みとプライバシー
    body: |-
      Web VideoMark では利用者が動画配信サービスにアクセスして動画を視聴している時には、ビットレートや解像度の他、再生が滑らかかどうかなどの再生品質情報、通信事業者や ISP などのネットワーク情報、クライアントが PC かモバイルかなどといったクライアント情報などの視聴情報を収集します。

      ブラウザーで収集された視聴情報を元に再生品質を可視化することで、利用者は実際の動画配信サービス利用時の再生品質を確認できます。有志で計測を行っていただいたデータはキャリアやプロバイダーなどの通信事業者、動画配信サービス運営者がそれぞれのサービス品質改善のために役立てるデータとして利用されるとともに、インターネットのネットワーク運用や通信品質・サービス品質などを研究する学術調査のためにも公開されます。

      Web VideoMark では利用者のプライバシーに最大限の配慮を行い、法律上で個人情報や個人特定情報として扱われる情報を一切保存しないだけでなく、計測結果ログを統計分析などを行っても利用者個人を特定してプライバシー上の問題とならないようにデータを記録しています。

      通信時の IP アドレスも記録前に匿名化処理 (末尾を削除) した上で記録するため、利用者個人を特定する情報となりません。利用者に関する情報は匿名化した IP アドレスとブラウザーのユーザーエージェント文字列から推定しており、GPS などでの高精度な位置情報や、一般のウェブサイトで取得できない端末の情報の取得は行っていません。
    image:
      src: https://res.cloudinary.com/videomark/image/upload/b_rgb:ffffff/videomark-overview.png
      alt: Web VideoMark 概要図
  qoe:
    heading: 体感品質値の推定終了について
    body: |-
      Web VideoMark では、動画再生中の一時停止の有無、解像度やビットレートの変動などを計測し、それらをもとに体感品質 (Quality of Experience, QoE) 値の推定計算を行ってきましたが、2026 年 3 月末をもって体感品質値の推定機能の提供を終了いたしました。

      近年、動画配信を取り巻く環境は大きく変化しており、解像度やコーデックの高度化、配信方式の多様化に加え、ネットワーク品質に関する指標も多岐にわたるようになっています。そのため、再生体験を表現する方法についても、より多面的な把握が求められる状況となっています。

      こうした状況を踏まえ、本プロジェクトでは体感品質値を中心的な指標として提示するのではなく、再生品質に影響を与える各要素を個別に計測し、より直接的かつ分かりやすく可視化する方針へと見直しを行いました。

      なお、QoE 値の品質推定ロジックは NTTドコモビジネス株式会社から提供いただいたものであり、日本電信電話株式会社ネットワーク基盤技術プロジェクトが開発した視聴状況可視化技術およびサービス品質評価技術を用いることで、客観的な QoE 値の計算を実現していました。この場を借りて関係者の皆様に深く感謝申し上げます。
  acknowledgment:
    heading: 謝辞
    body: |-
      Web VideoMark プロジェクトは [一般社団法人 WebDINO Japan](https://www.webdino.org/) が運営しています。本プロジェクトの実現に協力いただいている、各個人・団体・企業の皆様に感謝申し上げます。

      動画配信サービス利用時の視聴情報の取得、分析を行うソフトウェアの開発には [株式会社アクタスソフトウェア](https://www.acutus.jp/) の協力を得ています。各ソフトウェアの開発に協力・貢献いただいているメンバーについてはソースコードを公開している [GitHub](https://github.com/videomark) の各リポジトリをご覧ください。
